<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketPay || Homepage</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- tailwind and daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .outfit {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
  
    <header class="border-b-2 border-gray-300 sticky top-0 z-10 bg-base-200">
        <section class="w-11/12 py-3 mx-auto flex justify-between items-center">
            <div class="left flex items-center gap-2">
                <div class="w-[60px]">
                    <img src="assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2>$ <span id="balance" class=" font-bold text-2xl">45000</span></h2>
                    <p class="text-[#08080880]">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn btn-soft text-[#08080880]"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out</a>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto py-3 space-y-5">
        <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-[#08080880]">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>
        <div class="buttons grid grid-cols-3 gap-3">
            <button onclick="showAll('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft rounded-sm">
                <img src="assets/opt-1.png" alt="">
                <p class="text-[#08080880]">Add Money</p>
            </button>
            <button onclick="showAll('cashout')"   class="btn flex-col h-full py-4 btn-primary btn-soft rounded-sm">
                <img src="assets/opt-2.png" alt="">
                <p class="text-[#08080880]">Cashout</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-sm">
                <img src="assets/opt-3.png" alt="">
                <p class="text-[#08080880]">Send Money</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-sm">
                <img src="assets/opt-4.png" alt="">
                <p class="text-[#08080880]">Get Bonus</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-sm">
                <img src="assets/opt-5.png" alt="">
                <p class="text-[#08080880]">Pay Bill</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-sm">
                <img src="assets/opt-6.png" alt="">
                <p class="text-[#08080880]">Transactions</p>
            </button>
        </div>
    </section>
    <section id="add-money" class="w-11/12 mx-auto py-3 hidden ">
        <h2 class="text-xl font-bold ">Add Money</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold mb-2">Select A Bank</label>
                        <select id="addMoney-bank" class="select rounded-full bg-base-200 w-full mb-2">
                            <option disabled selected class="text-[#080808]" >Select Bank</option>
                            <option value="DBBL">DBBL</option>
                            <option value="City">City Bank</option>
                            <option value="Islami">Islami Bank</option>
                        </select>
                        <label class="label text-neutral font-bold">Bank Account Number</label>
                        <input type="email" maxlength="11" minlength="11" id="addMoney-number"
                            class="input rounded-full bg-base-200 w-full mb-2" placeholder="Enter 11 digit account number" />
        
                        <label class="label text-neutral font-bold">Amount to Add</label>
                        <input type="email" maxlength="11" minlength="11" id="addMoney-amount"
                            class="input rounded-full bg-base-200 w-full mb-2" placeholder="Enter amount to add" />
                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input type="password" maxlength="4" minlength="4" id="addMoney-pin"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                        <button id="addMoney-btn" class="btn rounded-full btn-primary mt-4">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>  
    <section id="cashout" class="w-11/12 mx-auto py-3 hidden">
        <h2 class="text-xl font-bold ">Cash Out</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold">Agent Number</label>
                        <input type="email" maxlength="11" minlength="11" id="cashout-number"
                            class="input rounded-full bg-base-200 w-full mb-2" placeholder="Enter 11 digit number" /> 
                  
                        <label class="label text-neutral font-bold">Amount</label>
                        <input type="email" maxlength="11" minlength="11" id="cashout-amount" class="input rounded-full bg-base-200 w-full mb-2"
                            placeholder="Enter amount to withdraw" /> 
                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input type="password" maxlength="4" minlength="4" id="cashout-pin" class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter 4 digit pin number" />
                        <button id="cashout-btn" class="btn rounded-full btn-primary mt-4">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="script/machine.js"></script>
    <script src="script/addmoney.js"></script>
    <script src="script/cashout.js"></script>


</body>

</html>
